<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabalhe Conosco | Tribalismo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background: radial-gradient(circle at top,#0f0f0f,#000);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* ===== CONTAINER ===== */

.container{
    width:100%;
    max-width:900px;
    background:linear-gradient(145deg,#0d0d0d,#111);
    padding:60px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 0 80px rgba(255,255,255,0.03);
}

/* ===== HEADER ===== */

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    margin-bottom:30px;
}

.logo img{ max-width:220px; }
.selo img{ max-width:90px; }

h1{
    text-align:center;
    font-size:34px;
    font-weight:700;
    letter-spacing:3px;
    margin-bottom:5px;
    background:linear-gradient(90deg,#ffffff,#cccccc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:40px;
    font-weight:300;
}

/* ===== FORM ===== */

form{
    display:grid;
    gap:20px;
}

input,textarea{
    width:100%;
    padding:16px;
    border-radius:12px;
    border:1px solid #222;
    background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
    color:#fff;
    transition:0.3s;
    font-size:15px;
}

input:focus,textarea:focus{
    border-color:#fff;
    box-shadow:0 0 10px rgba(255,255,255,0.2);
    outline:none;
}

textarea{
    height:110px;
    resize:none;
}

/* ===== SELECT CUSTOM ===== */

.custom-select{
    position:relative;
    cursor:pointer;
}

.select-selected{
    padding:16px;
    border-radius:12px;
    border:1px solid #222;
    background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
    color:#fff;
}

.select-options{
    position:absolute;
    top:105%;
    left:0;
    right:0;
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow-y:auto;
    max-height:220px;
    display:none;
    z-index:10;
}

.select-options div{
    padding:14px;
    transition:0.2s;
}

.select-options div:hover{
    background:#1f1f1f;
}

.custom-select.active .select-options{
    display:block;
}

/* ===== UPLOAD ===== */

.upload-area{
    display:flex;
    align-items:center;
    gap:15px;
    background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
    border:1px solid #222;
    padding:14px 18px;
    border-radius:12px;
    flex-wrap:wrap;
}

.upload-btn{
    background:linear-gradient(90deg,#ffffff,#dcdcdc);
    color:#000;
    padding:8px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
}

#file-name{
    font-size:13px;
    color:#aaa;
    word-break:break-word;
}

/* ===== CHECKBOX ===== */

.checkbox{
    display:flex;
    align-items:flex-start;
    gap:12px;
    font-size:13px;
    color:#ccc;
    line-height:1.5;
}

.checkbox input{
    margin-top:4px;
    width:16px;
    height:16px;
    accent-color:#fff;
}

/* ===== BUTTON ===== */

button{
    padding:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#ffffff,#dcdcdc);
    color:#000;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    text-transform:uppercase;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(255,255,255,0.2);
}

/* ===================================================== */
/* ================= RESPONSIVIDADE ===================== */
/* ===================================================== */

@media (max-width: 768px){

    body{
        padding:20px 12px;
        align-items:flex-start;
    }

    .container{
        padding:30px 20px;
        border-radius:16px;
    }

    .header{
        flex-direction:column;
        gap:15px;
    }

    .logo img{ max-width:160px; }
    .selo img{ max-width:70px; }

    h1{
        font-size:22px;
        letter-spacing:2px;
    }

    .subtitle{
        font-size:14px;
        margin-bottom:30px;
    }

    input,textarea{
        padding:14px;
        font-size:14px;
    }

    button{
        padding:16px;
        font-size:14px;
    }

}

@media (max-width: 480px){

    .container{
        padding:25px 15px;
    }

    h1{
        font-size:20px;
    }

    .upload-area{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="Tribalismo">
        </div>
        <div class="selo">
            <img src="selo.png" alt="Great Place to Work">
        </div>
    </div>

    <h1>TRABALHE CONOSCO</h1>
    <p class="subtitle">Faça parte do time Tribalismo</p>

    <form>
        <input type="text" placeholder="Nome Completo" required>
        <input type="email" placeholder="E-mail" required>
        <input type="text" placeholder="Telefone / WhatsApp" required>
        <input type="text" placeholder="CPF" required>
        <input type="text" placeholder="Cidade e Estado" required>

        <textarea placeholder="Conte brevemente sobre sua experiência profissional"></textarea>

        <div class="upload-area">
            <label for="curriculo" class="upload-btn">📎 Anexar Currículo</label>
            <span id="file-name">Nenhum arquivo selecionado</span>
            <input type="file" id="curriculo" accept=".pdf,.doc,.docx" hidden>
        </div>

        <div class="checkbox">
            <input type="checkbox" required>
            <label>
                Concordo com o tratamento dos meus dados pessoais conforme a LGPD.
            </label>
        </div>

        <button type="submit">Enviar Candidatura</button>
    </form>

</div>

</body>
</html>
